name: 🏗️ Terraform Pipeline

on:
  workflow_dispatch:   # 👈 manual only (IMPORTANT FIX)

permissions:
  id-token: write
  contents: read

jobs:

  terraform-plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: infra   # 👈 important (your infra branch)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: infra/terraform

      - name: Terraform Plan
        run: terraform plan -var-file="terraform.ci.tfvars"
        working-directory: infra/terraform


  terraform-apply:
    name: 🚀 Terraform Apply (Manual Approval)
    runs-on: ubuntu-latest
    needs: terraform-plan

    environment:
      name: production   # 👈 enables GitHub approval gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: infra

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: infra/terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file="terraform.ci.tfvars"
        working-directory: infra/terraform