name: Terraform Pipeline

on:
  push:
    branches:
      - main
      - infra
    paths:
      - "infra/terraform/**"

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:

  terraform-plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🔒 ENSURE SAME BACKEND STATE EVERY RUN
      - name: Terraform Init
        run: terraform init -reconfigure

      # 🔒 ENSURE SAME WORKSPACE EVERY TIME
      - name: Terraform Workspace
        run: terraform workspace select default || terraform workspace new default

      # 🔍 VALIDATE CONFIG
      - name: Terraform Validate
        run: terraform validate

      # 📋 PLAN (NO INPUTS, NO DRIFT)
      - name: Terraform Plan
        run: terraform plan -var-file="terraform.ci.tfvars" -lock-timeout=5m


  terraform-apply:
    name: 🚀 Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🔒 SAME STATE AS PLAN
      - name: Terraform Init
        run: terraform init -reconfigure

      # 🔒 SAME WORKSPACE AS PLAN
      - name: Terraform Workspace
        run: terraform workspace select default || terraform workspace new default

      # 🚀 APPLY ONLY PLANNED CHANGES
      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file="terraform.ci.tfvars" -lock-timeout=5m