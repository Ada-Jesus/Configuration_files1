# ═══════════════════════════════════════════════════════════════════
#  .github/workflows/blue-green-deploy.yml
#  Zero-Downtime Blue/Green – ASP.NET Core 8 → ECR → ECS Fargate
#
#  Shell scripts live in: infra/scripts/
#  Terraform lives in:    infra/terraform/
#
# ── REQUIRED GITHUB SECRETS ─────────────────────────────────────
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# ── REQUIRED GITHUB VARIABLES (Settings → Variables) ────────────
#   AWS_REGION          e.g. us-east-1
#   AWS_ACCOUNT_ID      e.g. 123456789012
#   ECR_REPOSITORY      e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/aspnet-api-production
#   ECS_CLUSTER         e.g. aspnet-api-production
#   BLUE_SERVICE        e.g. aspnet-api-production-blue
#   GREEN_SERVICE       e.g. aspnet-api-production-green
#   BLUE_TG_ARN         arn:aws:elasticloadbalancing:...
#   GREEN_TG_ARN        arn:aws:elasticloadbalancing:...
#   ALB_LISTENER_ARN    arn:aws:elasticloadbalancing:...
#   TEST_LISTENER_ARN   arn:aws:elasticloadbalancing:...
#   ALB_DNS_NAME        e.g. aspnet-api-production-alb-123.us-east-1.elb.amazonaws.com
#   ALB_ARN_SUFFIX      e.g. app/aspnet-api-production-alb/abc123  (from terraform output)
#   DESIRED_COUNT       e.g. 2
# ═══════════════════════════════════════════════════════════════════
name: 🚀 Blue/Green Deploy

on:
  push:
    branches: [main, 'release/**']
    paths-ignore: ['**.md', 'docs/**', 'infra/terraform/**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rollback:
        description: 'Set to true to trigger emergency rollback'
        required: false
        default: 'false'

env:
  IMAGE_TAG: ${{ github.run_number }}

permissions:
  contents: read
  checks: write

jobs:

  build-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - name: Restore packages
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Run tests
      run: dotnet test --no-build -c Release

    - name: Publish application
      run: dotnet publish -c Release -o publish --no-build


  docker-push:
    name: 🐳 Docker → ECR
    runs-on: ubuntu-latest
    needs: build-test

    outputs:
      image-uri: ${{ steps.set-uri.outputs.image-uri }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ vars.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

    - name: Set image URI
      id: set-uri
      run: echo "image-uri=${{ vars.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT


  deploy:
    name: 🚀 Blue/Green Deploy
    runs-on: ubuntu-latest
    needs: docker-push

    steps:
    - uses: actions/checkout@v4

    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Make scripts executable
      run: chmod +x infra/scripts/*.sh

    - name: 🔍 Detect live slot
      id: detect-slot
      env:
        ALB_LISTENER_ARN: ${{ vars.ALB_LISTENER_ARN }}
        BLUE_TG_ARN: ${{ vars.BLUE_TG_ARN }}
        GREEN_TG_ARN: ${{ vars.GREEN_TG_ARN }}
        BLUE_SERVICE: ${{ vars.BLUE_SERVICE }}
        GREEN_SERVICE: ${{ vars.GREEN_SERVICE }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/detect_slot.sh

    - name: 📋 Register task definition
      id: register-task
      env:
        ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
        DEPLOY_SERVICE: ${{ steps.detect-slot.outputs.deploy_service }}
        IMAGE_URI: ${{ needs.docker-push.outputs.image-uri }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/register_task.sh

    - name: ⬆️ Scale up deploy slot
      env:
        ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
        DEPLOY_SERVICE: ${{ steps.detect-slot.outputs.deploy_service }}
        TASK_DEF_ARN: ${{ steps.register-task.outputs.task_def_arn }}
        DESIRED_COUNT: ${{ vars.DESIRED_COUNT }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/scale_up.sh

    - name: 🏥 Health check
      env:
        ALB_DNS_NAME: ${{ vars.ALB_DNS_NAME }}
      run: bash infra/scripts/health_check.sh

    - name: 💨 Smoke tests
      env:
        ALB_DNS_NAME: ${{ vars.ALB_DNS_NAME }}
      run: bash infra/scripts/smoke_test.sh

    - name: 🔀 Switch traffic
      env:
        ALB_LISTENER_ARN: ${{ vars.ALB_LISTENER_ARN }}
        DEPLOY_TG_ARN: ${{ steps.detect-slot.outputs.deploy_tg }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/switch_traffic.sh

    - name: ⏪ Validate & rollback
      env:
        ALB_DNS_NAME: ${{ vars.ALB_DNS_NAME }}
        ALB_LISTENER_ARN: ${{ vars.ALB_LISTENER_ARN }}
        LIVE_TG_ARN: ${{ steps.detect-slot.outputs.live_tg }}
        LIVE_SERVICE: ${{ steps.detect-slot.outputs.live_service }}
        DEPLOY_SERVICE: ${{ steps.detect-slot.outputs.deploy_service }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/validate_and_rollback.sh

    - name: ⬇️ Scale down old slot
      if: success()
      env:
        ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
        LIVE_SERVICE: ${{ steps.detect-slot.outputs.live_service }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/scale_down.sh


  monitor:
    name: 📊 Burn-In Monitor
    runs-on: ubuntu-latest
    needs: deploy

    steps:
    - uses: actions/checkout@v4

    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Run burn-in monitor
      env:
        AWS_REGION: ${{ vars.AWS_REGION }}
        ALB_ARN_SUFFIX: ${{ vars.ALB_ARN_SUFFIX }}
      run: bash infra/scripts/monitor_burnin.sh


  rollback:
    name: ⏪ Emergency Rollback
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Run rollback
      env:
        ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
        ALB_LISTENER_ARN: ${{ vars.ALB_LISTENER_ARN }}
        ALB_DNS_NAME: ${{ vars.ALB_DNS_NAME }}
        AWS_REGION: ${{ vars.AWS_REGION }}
        BLUE_SERVICE: ${{ vars.BLUE_SERVICE }}
        GREEN_SERVICE: ${{ vars.GREEN_SERVICE }}
        BLUE_TG_ARN: ${{ vars.BLUE_TG_ARN }}
        GREEN_TG_ARN: ${{ vars.GREEN_TG_ARN }}
        DESIRED_COUNT: ${{ vars.DESIRED_COUNT }}
      run: bash infra/scripts/rollback.sh
      ### Note: This job can be triggered manually from the Actions tab with "Run workflow" → set "force_rollback" to true